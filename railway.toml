# Railway 用（Nixpacks が requirements.txt / Procfile を検出）
# ダッシュボードで Variables に LINE_* と ANTHROPIC_API_KEY を設定すること

[build]
builder = "nixpacks"

[deploy]
# Nixpacks が独自の gunicorn コマンド（固定ポート）を使わないよう明示する
startCommand = "sh start.sh"
healthcheckPath = "/"
healthcheckTimeout = 30
restartPolicyType = "ON_FAILURE"
