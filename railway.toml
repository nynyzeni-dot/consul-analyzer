# Railway: Nixpacks でビルドし、起動は必ず $PORT にバインド（start.sh は CRLF 起因の停止を避けるため使わない）

[build]
builder = "nixpacks"

[deploy]
# シェルに依存せず PORT を読む（$PORT 未展開で 8080 固定になる事故を防ぐ）
startCommand = "python railway_run.py"
healthcheckPath = "/"
# コールドスタート・初回ワーカー起動で 30 秒だと落ちることがあるため余裕を持たせる
healthcheckTimeout = 120
restartPolicyType = "ON_FAILURE"
